name: Deploy Web (Cloudflare Pages)

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - '.github/workflows/deploy-web.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/**'

jobs:
  build-and-deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # needed to post preview URL comments
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web lint
      - run: pnpm --filter web build

      - name: Deploy to Cloudflare Pages
        id: deploy
        working-directory: apps/web
        run: |
          BRANCH="${GITHUB_HEAD_REF:-main}"
          if [ "$BRANCH" = "main" ]; then
            pnpm exec wrangler pages deploy dist \
              --project-name=ai-tools \
              --branch=main
          else
            PREVIEW_URL=$(pnpm exec wrangler pages deploy dist \
              --project-name=ai-tools \
              --branch="$BRANCH" 2>&1 | grep -oP 'https://[^\s]+')
            echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request' && steps.deploy.outputs.preview_url != ''
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Cloudflare Pages Preview\n\n${process.env.PREVIEW_URL}`
            })
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
