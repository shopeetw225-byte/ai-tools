name = "ai-tools-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
# Set AI_GATEWAY_URL via dashboard or:
#   wrangler secret put AI_GATEWAY_URL
# Format: https://gateway.ai.cloudflare.com/v1/{account-id}/ai-tools-gateway
AI_GATEWAY_URL = "https://gateway.ai.cloudflare.com/v1/REPLACE_ACCOUNT_ID/ai-tools-gateway"

# ─── Secrets (set via wrangler secret put) ───────────────────────────────────
# ANTHROPIC_API_KEY — required for claude-haiku / claude-sonnet model selection

# ─── D1 Database ─────────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "ai-tools-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

# ─── KV Namespace (used for rate limiting) ───────────────────────────────────
[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_NAMESPACE_ID"

# ─── R2 Bucket ───────────────────────────────────────────────────────────────
[[r2_buckets]]
binding = "ASSETS"
bucket_name = "ai-tools-assets"

# ─── AI (Workers AI) ─────────────────────────────────────────────────────────
[ai]
binding = "AI"

# ─── Dev environment overrides ───────────────────────────────────────────────
[env.dev]
name = "ai-tools-api-dev"

[env.dev.vars]
ENVIRONMENT = "development"
AI_GATEWAY_URL = "https://gateway.ai.cloudflare.com/v1/REPLACE_ACCOUNT_ID/ai-tools-gateway"

# ─── Preview (staging) ───────────────────────────────────────────────────────
[env.preview]
name = "ai-tools-api-preview"

[env.preview.vars]
ENVIRONMENT = "preview"
AI_GATEWAY_URL = "https://gateway.ai.cloudflare.com/v1/REPLACE_ACCOUNT_ID/ai-tools-gateway"
