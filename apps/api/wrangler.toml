name = "ai-tools-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
# Set AI_GATEWAY_URL via dashboard or:
#   wrangler secret put AI_GATEWAY_URL
# Format: https://gateway.ai.cloudflare.com/v1/{account-id}/ai-tools-gateway
AI_GATEWAY_URL = "https://gateway.ai.cloudflare.com/v1/a1540e7bbaec0f1785a7f339ef92f1a1/ai-tools-gateway"

# ─── Secrets (set via wrangler secret put) ───────────────────────────────────
# ANTHROPIC_API_KEY — required for claude-haiku / claude-sonnet model selection
# CLOUDFLARE_API_TOKEN — required for AI Gateway Analytics dashboard
#   Token needs: AI Gateway Read permission
#   Create at: https://dash.cloudflare.com/profile/api-tokens
# ECPAY_MERCHANT_ID — 綠界特店編號
# ECPAY_HASH_KEY — 綠界 HashKey
# ECPAY_HASH_IV — 綠界 HashIV

# ─── D1 Database ─────────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "catfish-ai-tools-db"
database_id = "fa02ea94-817c-4aeb-873a-ede18e43b11e"
migrations_dir = "../../db/migrations"

# ─── KV Namespace (used for rate limiting) ───────────────────────────────────
[[kv_namespaces]]
binding = "KV"
id = "189e3b4e550c4dc8b7c7c68c719b9825"
preview_id = "189e3b4e550c4dc8b7c7c68c719b9825"

# ─── R2 Bucket (not provisioned for MVP; uncomment when ready) ───────────────
# [[r2_buckets]]
# binding = "ASSETS"
# bucket_name = "ai-tools-assets"

# ─── AI (Workers AI) ─────────────────────────────────────────────────────────
[ai]
binding = "AI"

# ─── Dev environment overrides ───────────────────────────────────────────────
[env.dev]
name = "ai-tools-api-dev"

[env.dev.vars]
ENVIRONMENT = "development"
AI_GATEWAY_URL = "https://gateway.ai.cloudflare.com/v1/a1540e7bbaec0f1785a7f339ef92f1a1/ai-tools-gateway"

# ─── Preview (staging) ───────────────────────────────────────────────────────
[env.preview]
name = "ai-tools-api-preview"

[env.preview.vars]
ENVIRONMENT = "preview"
AI_GATEWAY_URL = "https://gateway.ai.cloudflare.com/v1/a1540e7bbaec0f1785a7f339ef92f1a1/ai-tools-gateway"
